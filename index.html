<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Notepad</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #editor { width: 100%; height: 70vh; background: #050505; color: #0f0; border: 1px solid #333; padding: 10px; font-size: 16px; outline: none; }
        #filename { background: #111; color: #0f0; border: 1px solid #333; padding: 5px; margin-bottom: 10px; width: 200px; }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px 15px; cursor: pointer; }

        /* 4. Red Pulse - No name, no peace */
        @keyframes redPulse {
            0% { border-color: #500; box-shadow: 0 0 2px #500; }
            50% { border-color: #f00; box-shadow: 0 0 10px #f00; }
            100% { border-color: #500; box-shadow: 0 0 2px #500; }
        }
        .pulse-active { animation: redPulse 1.5s infinite !important; }

        /* Toggle Slider */
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #222; border: 1px solid #0f0; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #0f0; transition: .4s; }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>

    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
        <label class="switch"><input type="checkbox" id="storage-toggle"><span class="slider"></span></label>
        <span id="toggle-label" style="font-size: 11px; min-width: 40px;">PHONE</span>
        
        <select id="recent-list" style="background: #111; color: #0f0; border: 1px solid #444; font-size: 11px;"><option>RECENTS</option></select>
        <select id="saved-list" style="background: #111; color: #0f0; border: 1px solid #444; font-size: 11px;"><option>SAVED</option></select>
        
        <button id="run-btn" style="padding: 2px 10px;">RUN</button>
    </div>

    <input type="text" id="filename" placeholder="filename">
    <select id="extension">
        <option value=".txt">.txt</option>
        <option value=".html">.html</option>
        <option value=".css">.css</option>
        <option value=".js">.js</option>
    </select>

    <textarea id="editor" placeholder="Write here..."></textarea>

    <div class="controls">
        <button onclick="sovereignSave()">SAVE</button>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const filenameInput = document.getElementById('filename');
        const extensionSelect = document.getElementById('extension');
        const storageToggle = document.getElementById('storage-toggle');
        const recentList = document.getElementById('recent-list');
        const savedList = document.getElementById('saved-list');

        // ORIGINAL SAVE LOGIC
        function saveFile() {
            const text = editor.value;
            const name = (filenameInput.value || "note") + extensionSelect.value;
            const blob = new Blob([text], { type: "text/plain" });
            const anchor = document.createElement("a");
            anchor.download = name;
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }

        /* --- INTEGRITY INSERTIONS --- */

        // 4. Naming Highlight
        function checkNaming() {
            filenameInput.classList.toggle('pulse-active', !filenameInput.value.trim());
        }
        filenameInput.addEventListener('input', checkNaming);

        // 1. Toggle Label
        storageToggle.addEventListener('change', () => {
            document.getElementById('toggle-label').innerText = storageToggle.checked ? "APP" : "PHONE";
        });

        // 5. Run Logic (RAM/Blob)
        document.getElementById('run-btn').addEventListener('click', () => {
            const blob = new Blob([editor.value], { type: 'text/html' });
            window.open(URL.createObjectURL(blob), '_blank');
        });

        // 2 & 3. History & Storage Logic
        function updateLists(isExplicitSave) {
            const name = (filenameInput.value || "Untitled") + extensionSelect.value;
            const content = editor.value;
            const timestamp = Date.now();

            // All-Activity Log (Recents)
            let recents = JSON.parse(localStorage.getItem('sov_recents') || '[]');
            recents = [{name, content, timestamp}, ...recents.filter(i => i.name !== name)].slice(0, 20);
            localStorage.setItem('sov_recents', JSON.stringify(recents));

            if (isExplicitSave && storageToggle.checked) {
                let saved = JSON.parse(localStorage.getItem('sov_saved') || '[]');
                saved = [{name, content, timestamp}, ...saved.filter(i => i.name !== name)];
                localStorage.setItem('sov_saved', JSON.stringify(saved));
            }
            renderDropdowns();
        }

        function renderDropdowns() {
            const recents = JSON.parse(localStorage.getItem('sov_recents') || '[]');
            const saved = JSON.parse(localStorage.getItem('sov_saved') || '[]');
            
            recentList.innerHTML = '<option value="">RECENTS</option>';
            recents.forEach(i => recentList.add(new Option(i.name, i.name)));
            
            savedList.innerHTML = '<option value="">SAVED</option>';
            saved.forEach(i => savedList.add(new Option(i.name, i.name)));
        }

        function loadEntry(listName, fileName) {
            const data = JSON.parse(localStorage.getItem(listName) || '[]');
            const entry = data.find(i => i.name === fileName);
            if (entry) {
                editor.value = entry.content;
                const parts = entry.name.split('.');
                extensionSelect.value = "." + parts.pop();
                filenameInput.value = parts.join('.');
                checkNaming();
            }
        }

        recentList.addEventListener('change', (e) => loadEntry('sov_recents', e.target.value));
        savedList.addEventListener('change', (e) => loadEntry('sov_saved', e.target.value));
        editor.addEventListener('input', () => updateLists(false));

        // Master Save Router
        window.sovereignSave = function() {
            if (storageToggle.checked) {
                updateLists(true);
            } else {
                saveFile();
            }
        };

        // Init
        renderDropdowns();
        checkNaming();
    </script>
</body>
</html>
